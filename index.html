<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#05070f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartCart — Análise de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#05070f;--base:#0b0e1c;--panel:#10152a;--panel2:#151c34;
  --rim:#1e2845;--rim2:#2a375e;--ice:#e8f0ff;--mist:#8899cc;--fog:#4a5880;
  --neon:#3d7fff;--neon2:#00c9ff;--hot:#ff4b6e;--warm:#ffb347;--mint:#00e59b;
  /* aliases para compatibilidade com código existente */
  --bg:var(--void);--s1:var(--panel);--s2:var(--panel2);--s3:#1a2240;--s4:var(--rim);
  --border:var(--rim);--border2:var(--rim2);--text:var(--ice);--muted:var(--fog);
  --hint:var(--fog);--accent:var(--neon2);--accent2:var(--neon);--accent3:var(--warm);
  --accent4:var(--hot);--green:var(--mint);--red:var(--hot);
  --font-display:'Bebas Neue',sans-serif;--font-ui:'Outfit',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--ice);font-family:var(--font-ui);font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.35}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

/* ── Upload Screen ── */
#uploadScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;z-index:1}
#uploadScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,201,255,.08) 0%,transparent 70%);pointer-events:none}
.logo{font-size:13px;font-family:var(--font-ui);color:var(--neon2);letter-spacing:3px;margin-bottom:48px;opacity:.8;font-weight:600;text-transform:uppercase}
.upload-title{font-family:var(--font-display);font-size:clamp(48px,10vw,96px);text-align:center;line-height:1;letter-spacing:3px;margin-bottom:16px;background:linear-gradient(135deg,var(--ice),var(--mist));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upload-title span{background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upload-subtitle{font-size:13px;color:var(--fog);text-align:center;margin-bottom:48px;font-family:var(--font-ui);font-weight:500;text-transform:uppercase;letter-spacing:2px}

.mode-tabs{display:flex;gap:8px;margin-bottom:32px}
.mode-tab{padding:10px 22px;border-radius:8px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid var(--rim);background:var(--panel2);color:var(--fog);text-transform:uppercase;letter-spacing:.5px}
.mode-tab.active{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;border-color:transparent}

/* Aba Drive */
#drivePanel{width:100%;max-width:520px;display:flex;flex-direction:column;gap:12px}
.drive-input-wrap{position:relative}
.drive-input{width:100%;background:var(--panel2);border:1px solid var(--rim);border-radius:8px;padding:14px 18px;font-family:var(--font-ui);font-size:14px;color:var(--ice);outline:none;transition:border-color .2s}
.drive-input:focus{border-color:var(--neon)}
.drive-input::placeholder{color:var(--fog)}
.drive-btn{width:100%;padding:14px;border-radius:8px;background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;font-family:var(--font-ui);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.drive-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(61,127,255,.4)}
.drive-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Aba Upload */
#uploadPanel{width:100%;max-width:520px}
.drop-zone{width:100%;border:1px dashed var(--rim2);border-radius:12px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .25s;background:var(--panel);position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--neon);background:rgba(61,127,255,.04);transform:scale(1.01)}
.drop-icon{width:56px;height:56px;border-radius:12px;background:var(--panel2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:1px solid var(--rim)}
.drop-icon svg{width:24px;height:24px;stroke:var(--neon2);fill:none;stroke-width:1.5}
.drop-zone h3{font-size:17px;font-weight:600;margin-bottom:8px}
.drop-zone p{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
#fileInput{display:none}
.file-hint{font-size:11px;color:var(--hint);margin-top:12px;font-family:'DM Mono',monospace}
.demo-btn{margin-top:20px;background:transparent;border:1px solid var(--rim);color:var(--fog);padding:10px 24px;border-radius:8px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.demo-btn:hover{border-color:var(--neon);color:var(--neon2)}

.col-hint{width:100%;max-width:520px;margin-top:16px;background:var(--panel);border-radius:10px;padding:14px 18px;border:1px solid var(--rim)}
.col-hint p{font-size:11px;color:var(--fog);font-family:var(--font-ui);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.col-tags{display:flex;flex-wrap:wrap;gap:6px}
.col-tag{font-size:11px;font-family:var(--font-ui);padding:4px 10px;background:var(--panel2);border-radius:6px;color:var(--mist);border:1px solid var(--rim)}

/* ── Progress Fetch ── */
#fetchProgress{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--rim);border-radius:12px;padding:20px;display:none}
.fetch-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fetch-bar-bg{height:6px;background:var(--s4);border-radius:6px;overflow:hidden;margin-bottom:12px}
.fetch-bar-fill{height:6px;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:6px;transition:width .4s ease;width:0%}
.fetch-log{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.fetch-log-item{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:8px;padding:3px 0}
.fetch-log-item.ok{color:var(--mint)}
.fetch-log-item.err{color:var(--red)}
.fetch-log-item.pending{color:var(--warm)}
.fetch-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Dashboard ── */
#dashboard{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(5,7,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--rim);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-family:var(--font-display);font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-brand span{}
.topbar-file{font-size:11px;font-family:var(--font-ui);color:var(--fog);display:flex;align-items:center;gap:8px;font-weight:500}
.topbar-file::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);display:inline-block;animation:pulse-dot 2s infinite}@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:8px}
.reset-btn{background:transparent;border:1px solid var(--rim);color:var(--fog);padding:6px 14px;border-radius:7px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.4px}
.reset-btn:hover{border-color:var(--hot);color:var(--hot)}
.sync-btn{background:rgba(0,201,255,.1);border:1px solid rgba(0,201,255,.3);color:var(--neon2);padding:6px 14px;border-radius:7px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:none;text-transform:uppercase;letter-spacing:.4px}
.sync-btn:hover{background:rgba(0,201,255,.18)}

.dash-nav{display:flex;gap:0;border-bottom:1px solid var(--rim);padding:0 16px;overflow-x:auto;background:var(--panel);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.dash-nav::-webkit-scrollbar{height:0}
.nav-tab{padding:16px 18px;font-size:12px;font-weight:600;color:var(--fog);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.5px}
.nav-tab:hover{color:var(--ice)}
.nav-tab.active{color:var(--neon2);border-bottom-color:var(--neon2)}

.dash-body{padding:16px;max-width:1400px;margin:0 auto}@media(min-width:640px){.dash-body{padding:32px}}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.kpi{background:var(--panel);border:1px solid var(--rim);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;cursor:default}
.kpi:hover{transform:translateY(-3px);border-color:var(--rim2)}
.kpi-label{font-size:10px;font-family:var(--font-ui);color:var(--fog);letter-spacing:.6px;margin-bottom:12px;text-transform:uppercase;font-weight:600}
.kpi-value{font-family:var(--font-display);font-size:28px;line-height:1;background:linear-gradient(135deg,var(--ice),var(--mist));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.kpi-sub{font-size:10px;color:var(--fog);margin-top:4px;font-family:var(--font-ui);font-weight:400}

/* ── Panels ── */
.panel{background:var(--panel);border:1px solid var(--rim);border-radius:14px;padding:20px;margin-bottom:14px}
.panel-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:12px}
.panel-title{font-size:12px;font-weight:700;color:var(--ice);text-transform:uppercase;letter-spacing:1px}
.panel-desc{font-size:11px;color:var(--fog);margin-bottom:18px;font-weight:400}
.panel-badge{font-size:10px;font-family:var(--font-ui);font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;border:1px solid var(--rim2);color:var(--mist)}
.badge-green{background:rgba(0,229,155,.12);color:var(--mint);border-color:rgba(0,229,155,.3)}
.badge-amber{background:rgba(255,179,71,.12);color:var(--warm);border-color:rgba(255,179,71,.3)}
.badge-blue{background:rgba(61,127,255,.12);color:var(--neon2);border-color:rgba(61,127,255,.3)}
.badge-red{background:rgba(255,75,110,.12);color:var(--hot);border-color:rgba(255,75,110,.3)}
.badge-pink{background:rgba(245,106,154,.12);color:var(--accent4)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}}

.chart-box{position:relative;width:100%}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
th{text-align:left;padding:10px 14px;color:var(--fog);font-weight:700;font-size:10px;font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--rim)}
td{padding:10px 14px;border-bottom:1px solid var(--rim);color:var(--ice);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover td{background:var(--panel2)}
.num{font-family:'DM Mono',monospace;text-align:right}
th.num{text-align:right}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--font-ui);font-weight:600}

/* ── Corr ── */
.corr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.corr-card{background:var(--panel2);border:1px solid var(--rim);border-radius:12px;padding:16px;transition:border-color .2s}
.corr-card:hover{border-color:var(--rim2)}
.corr-pair{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.corr-pair .plus{color:var(--hint);font-size:11px}
.corr-bar-bg{height:3px;background:var(--s4);border-radius:3px;margin-bottom:8px}
.corr-bar-fill{height:3px;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.corr-meta{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}

/* ── Price Alert ── */
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--panel2);border-radius:12px;border:1px solid var(--rim);transition:border-color .2s}
.alert-row:hover{border-color:var(--rim2)}
.alert-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.alert-info{flex:1;min-width:0}
.alert-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.alert-prices{display:flex;gap:14px;font-size:11px;font-family:'DM Mono',monospace}
.alert-last{flex-shrink:0;text-align:right}
.alert-last .price{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.alert-last .label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

.vol-select{background:var(--panel2);border:1px solid var(--rim);color:var(--ice);padding:8px 14px;border-radius:8px;font-family:var(--font-ui);font-size:13px;outline:none;cursor:pointer;max-width:340px;width:100%}
.vol-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

.prog-bg{height:4px;background:var(--s4);border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:4px;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--neon),var(--neon2))}

.rank{width:24px;height:24px;border-radius:6px;background:var(--panel2);border:1px solid var(--rim);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-ui);font-weight:600;color:var(--mist);flex-shrink:0}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace}
.fpill{padding:6px 14px;border-radius:20px;border:1px solid var(--rim);background:none;color:var(--fog);font-family:var(--font-ui);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.fpill:hover{color:var(--ice);border-color:var(--mist)}
.fpill.on{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;border-color:transparent;font-weight:700}
.filter-label{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;margin-right:4px}

/* ── Emitente badge ── */
.emit-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-family:var(--font-ui);background:var(--panel2);border:1px solid var(--rim);color:var(--mist)}
.emit-dot{width:6px;height:6px;border-radius:50%}

/* ── Detalhes Tab ── */
.detail-table-wrap{overflow-x:auto}
.search-input{background:var(--panel2);border:1px solid var(--rim);color:var(--ice);padding:8px 14px;border-radius:8px;font-family:var(--font-ui);font-size:13px;outline:none;width:100%;max-width:340px;margin-bottom:16px}
.search-input:focus{border-color:var(--neon)}
.search-input::placeholder{color:var(--fog)}

/* ── Loading overlay ── */
#loadingOverlay{position:fixed;inset:0;background:var(--void);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s}
#loadingOverlay.show{opacity:1;pointer-events:all}
.spinner{width:32px;height:32px;border:2px solid var(--rim);border-top-color:var(--neon2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-family:'DM Mono',monospace;color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}

/* ── Emitentes tab ── */
.emit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.emit-card{background:var(--panel2);border:1px solid var(--rim);border-radius:12px;padding:16px;transition:border-color .2s}
.emit-card:hover{border-color:var(--rim2)}
.emit-card-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emit-card-cnpj{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:12px}
.emit-card-stats{display:flex;gap:16px}
.emit-card-stat{display:flex;flex-direction:column;gap:2px}
.emit-card-stat-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace}
.emit-card-stat-lbl{font-size:10px;color:var(--hint);font-family:'DM Mono',monospace;text-transform:uppercase}

.error-box{background:rgba(255,75,110,.08);border:1px solid rgba(255,75,110,.3);border-radius:8px;padding:12px 16px;font-size:12px;font-family:var(--font-ui);color:var(--hot);margin-bottom:12px;display:none}

/* ══ Lista de Compras — mobile-first ══ */
.lista-wrap{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.lista-header-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px}

/* Font-size 16px nos inputs evita zoom automático no iOS */
.lista-search{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--rim);color:var(--ice);padding:11px 14px;border-radius:8px;font-family:var(--font-ui);font-size:16px;outline:none;-webkit-appearance:none}
.lista-search:focus{border-color:var(--neon)}
.lista-search::placeholder{color:var(--hint)}
.lista-cat-sel{background:var(--panel2);border:1px solid var(--rim);color:var(--ice);padding:11px 14px;border-radius:8px;font-family:var(--font-ui);font-size:16px;outline:none;cursor:pointer;-webkit-appearance:none;max-width:160px}
.lista-chips{display:flex;gap:6px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.lista-chips::-webkit-scrollbar{display:none}

/* Chips — touch target mínimo 44px */
.lchip{min-height:36px;padding:6px 14px;border-radius:20px;border:1px solid var(--rim);background:none;color:var(--fog);font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;text-transform:uppercase;letter-spacing:.4px}
.lchip.on{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;border-color:transparent;font-weight:700}

.lcat-card{background:var(--panel);border:1px solid var(--rim);border-radius:12px;overflow:hidden}
.lcat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:var(--panel2);user-select:none;min-height:52px;-webkit-tap-highlight-color:transparent}
.lcat-left{display:flex;align-items:center;gap:8px}
.lcat-emoji{font-size:17px}
.lcat-name{font-family:var(--font-ui);font-weight:700;font-size:13px;color:var(--ice)}
.lcat-badge{font-size:10px;font-family:var(--font-ui);font-weight:600;padding:2px 8px;border-radius:20px;background:var(--rim);color:var(--mist)}
.lcat-badge.done{background:rgba(0,201,255,.15);color:var(--neon2)}
.lcat-chevron{color:var(--hint);font-size:12px;transition:transform .2s;flex-shrink:0}

/* Item row — 48px touch target */
.litem-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .1s;border-top:.5px solid var(--border);min-height:48px;-webkit-tap-highlight-color:transparent}
.litem-row.checked{background:rgba(61,127,255,.05)}

/* Checkbox — 24px para fácil toque */
.lcb{width:24px;height:24px;border:1.5px solid var(--border2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.litem-row.checked .lcb{background:var(--neon2);border-color:var(--neon2)}
.lcb-tick{color:var(--void);font-size:12px;font-weight:900;opacity:0;transform:scale(.4);transition:all .15s}
.litem-row.checked .lcb-tick{opacity:1;transform:scale(1)}
.litem-label{font-size:14px;flex:1;line-height:1.3;font-family:var(--font-ui);font-weight:500}
.litem-row.checked .litem-label{text-decoration:line-through;color:var(--hint)}
.litem-sub{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;margin-top:3px}
.litem-price{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap;flex-shrink:0}
.litem-row.checked .litem-price{display:none}

/* Add row — input 16px para evitar zoom iOS */
.ladd-row{display:flex;gap:6px;padding:10px 12px 12px;border-top:.5px dashed var(--border)}
.ladd-row input{flex:1;background:transparent;border:none;color:var(--ice);font-family:var(--font-ui);font-size:16px;outline:none;min-height:36px;-webkit-appearance:none}
.ladd-row input::placeholder{color:var(--hint);font-style:italic}
.ladd-btn{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* Bottom bar — safe area para iPhone com notch */
.lista-bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--void) 65%,transparent);padding:12px 20px calc(18px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;z-index:50;pointer-events:none}
.lista-bottom>*{pointer-events:all}
.lprog-pill{flex:1;background:var(--panel);border:1px solid var(--rim);border-radius:99px;padding:10px 14px;font-size:12px;font-family:var(--font-ui);color:var(--fog);text-align:center;font-weight:500}
.lprog-pill b{color:var(--neon2)}
.lwpp-btn{background:#25D366;color:#fff;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:11px 18px;border-radius:99px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 2px 12px rgba(37,211,102,.3);-webkit-tap-highlight-color:transparent;min-height:44px}
.lwpp-btn svg{flex-shrink:0}

/* Modal — slide-up sheet no mobile */
.lmodal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-end;justify-content:center}
.lmodal-overlay.open{display:flex}
.lmodal{background:var(--panel);border:1px solid var(--rim);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:82vh;display:flex;flex-direction:column;gap:14px}
.lmodal-title{font-family:var(--font-display);font-size:22px;letter-spacing:1px;display:flex;align-items:center;gap:8px;color:var(--ice)}
.lmodal-preview{background:var(--void);border:1px solid var(--rim);border-radius:12px;padding:14px;font-size:13px;line-height:1.75;color:var(--ice);white-space:pre-wrap;overflow-y:auto;flex:1;font-family:var(--font-ui);-webkit-overflow-scrolling:touch}
.lmodal-actions{display:flex;gap:8px}
.lmodal-btn{flex:1;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;min-height:48px;-webkit-tap-highlight-color:transparent}

.lmodal-btn.close{background:var(--panel2);color:var(--fog);border:1px solid var(--rim);flex:0 0 auto;padding:14px 18px}
.lista-generate-btn{width:100%;padding:16px;border-radius:10px;background:rgba(61,127,255,.1);border:1px solid rgba(61,127,255,.3);color:var(--neon2);font-family:var(--font-ui);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:4px;min-height:52px;text-transform:uppercase;letter-spacing:.5px}

/* Espaço extra no fim da lista para não ficar atrás da bottom bar */
#listaContent{padding-bottom:80px}

/* ── Sugestão IA ── */
.sug-panel{background:var(--panel);border:1px solid var(--rim2);border-radius:14px;overflow:hidden;margin-bottom:4px}
.sug-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(61,127,255,.08);border-bottom:1px solid var(--rim)}

.sug-item:hover{border-color:var(--rim2)}

.sug-item-info{flex:1;min-width:0}
.sug-item-name{font-size:13px;font-weight:600;color:var(--ice);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-ui)}
.sug-item-meta{font-size:11px;color:var(--fog);font-family:var(--font-ui);margin-top:2px}
.sug-badge{font-size:10px;font-family:var(--font-ui);font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.sug-badge.urgent{background:rgba(255,75,110,.2);color:var(--hot)}
.sug-badge.warn{background:rgba(255,179,71,.2);color:var(--warm)}
.sug-badge.ok{background:rgba(0,229,155,.15);color:var(--mint)}

.lchip.sug-chip:hover{background:rgba(61,127,255,.2)}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <span class="loading-text" id="loadingText">processando...</span>
</div>

<!-- ═══ UPLOAD ═══ -->

<script>
Chart.register(ChartDataLabels);

// ════════════════════════════════════════════════════
// ══ LISTA DE COMPRAS ══
// ════════════════════════════════════════════════════

// Categorias (8 + Outros/Pet). A classificacao real e feita por classifyId(),
// logo abaixo: as regras ordenadas vivem la, nao nos kw.
const LISTA_CATS = [
  { id:'mercearia',  emoji:'🥫', name:'Mercearia', kw:[] },
  { id:'bebidas',    emoji:'🧃', name:'Bebidas', kw:[] },
  { id:'hortifruti', emoji:'🥬', name:'Hortifruti', kw:[] },
  { id:'acougue',    emoji:'🥩', name:'Açougue', kw:[] },
  { id:'padaria',    emoji:'🍞', name:'Padaria', kw:[] },
  { id:'limpeza',    emoji:'🧼', name:'Limpeza', kw:[] },
  { id:'higiene',    emoji:'🧴', name:'Higiene e beleza', kw:[] },
  { id:'frios',      emoji:'🧀', name:'Frios, laticínios e Bombonière', kw:[] },
  { id:'outros',     emoji:'📦', name:'Outros / Pet', kw:[] }
];

// ── Classificador (regras ordenadas; o 1º keyword que casar vence) ──
// Validado contra o historico real. Devolve o id de uma categoria de LISTA_CATS.
function classifyNorm(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[._/]/g,' ').replace(/\s+/g,' ').trim();
}
const _CLS_RULES = [
  ['outros', ['racao','rac caeg','rac ped','keldog','pilha','vela ','jg xic','xic lilly','queijeira','band al','saco al dul']],
  ['limpeza', ['detergente','det liq','lava louca','l rou liq','lava roupa','l p uau','kit limp','limp casa flor','limp ','limpador','amaciante','amac r','amac ','agua san','desin','des barra','sap cif','sapolio','inset','sbp','ped san','pedra san','gel ad san','essen casaflor','essen aromatec','aromatec','casaflor','saco lixo','saco free','saco l b','flanela','bucha','esp asso','esponja','filme pvc','filme','toalha pap','toal pap','t pap','guard']],
  ['higiene', ['cr dent','creme dent','remov b ac','removin','remov ','papel hig','pap h pers','pap h','p hig','cr trat','skala','es al ab']],
  ['mercearia', ['bat palh','milh vde','mil vd','milho verde','uva pas','ovos','ovo ','l con moca','leite condens','far lac','farinha lac','farinha pao','filtro pap','coco ral','lei coc','leite coco','polpa','pol bras','pol fr bras','tapioca','azeit vde f fat','az vde','az fat v','az v s','azeitona','bis sal','cl s o','cream cracker']],
  ['padaria', ['pao ','pao franc','pao fr ass','pao for','pao hamb','pao qjo','pao doce','pao mila','pao fo','chipa','torr baudu','torrada','bisn','bisnaguinha']],
  ['frios', ['presunto','pres perdigao','pres ','mortad','salame','salaminho','bacon','baconil','lombo can','qjo','queijo','muss','mussarela','coalho','qu p aleg','p aleg mus','mus fat','mus lac','mus gar','req c lig','req ita','req p al','mist req','requeij','iog','iorgute','iogurte','lei ferm','leite ferm','leit l v','lei l v','cr le','cr lei','creme de leite','mant itam','manteiga','pto fgo','coz fat']],
  ['acougue', ['fgo','frango','pe fr','asa fgo','asa fr','coxa','sobrecoxa','sob fg','coxin','file p fgo','fi pe fg','filez','filezinho','fgo pif','bov','acem','patinho','musc','musculo','pa bov','rabada','alcatra','costela','cost sui','cost su','cost ','pernil','per su','file mignon','mignon','file mig','file tilap','tilap','salsicha','salsi','sals ','ling','linguica','hamb','h pock','hot pock','char 2001','charque']],
  ['bebidas', ['ag min','agua min','ag ton','agua ton','agua coco','ag coc','ag co','ga berry','gatorade','gator','isot','red bull','r bull','energ','beb en','refri','refr','r cola','c cola','pep bla','pepsi','coca','sprite','re sprite','cerv','cer ','cerveja','stella','antar','cap sen','pil600','vinho','vh ','beb mista','d val','beb soj','beb ades','ades']],
  ['frios', ['lays','bat ch','bat chips','batatiss','bat feita','chips','salg ','salgad','gulao','chi fan','con dis dori','dori','fandango','pip doce','pipoca','bala ','pirul','goma masc','chiclete','choc','amen ','amendoim','amen pa','cast caju','castanha','cast ','ban ch','banana chip','acaiz','ralinho','car rec sort','biscoito','bisc','bis ','wafer','waffer','maizena','maiz','papa ovo']],
  ['hortifruti', ['pera','melao','mamao','laranja','lar pera','maca','manga','melancia','mexerica','pokan','abacate','goiaba','banana','bananamaca','limao','maracuja','tomate','tomatel','cebola','cebolinha','alho','cenoura','batata ing','bat inglesa','batata asterix','batata aster','batata d roxa','mandioca','baroa','pimentao','pim verde','pim verm','beterraba','repolho','chuchu','berinjela','abobora','espin','agriao','alface','salsa','couve','hortela','manjericao','alecrim','mor con','morango']]
];
const _CLS_MERCEARIA = ['arroz','arr ag','feij','fei verm','lentilha','macarrao','mac s am','mac ins','farinha','amido','glacucar','fuba','canjiq','canjica','acucar','oleo','azeite','vinag','mol ','molh','mol tom','mol heinz','catchup','ketchup','sazon','tempero','temp maggi','faro pr','farofa','cafe','filtro pap','acho','cha ','ferm po','fermento','sard','sardinha','palmito','ameixa calda','mist ita choc','m bo vilma','m bolo','amen','pal dent','coco','leite coco','ovos','ovo'];
function classifyId(label){
  const n = classifyNorm(label);
  if (!n) return 'mercearia';
  if (n.includes('lasan')) return 'mercearia';
  for (const [id, keys] of _CLS_RULES){
    for (const k of keys){ if (n.includes(k)) return id; }
  }
  for (const k of _CLS_MERCEARIA){ if (n.includes(k)) return 'mercearia'; }
  return 'mercearia';
}

// Estado da lista (em memória — sem localStorage pois artifacts não suportam)
let LISTA_STATE = {
  checked: {},
  collapsed: {},
  custom: {},   // {catId: [{id, label}]}
  catFilter: 'todas',
  itemFilter: 'todos',
  search: '',
};

// Gera lista de itens a partir do histórico DATA
function buildListaFromData() {
  if (!DATA.length) return;

  // Conta frequência de cada produto
  const freq = {};
  DATA.forEach(r => {
    const k = r.desc.trim().toUpperCase();
    if (!freq[k]) freq[k] = { label: r.desc.trim(), count: 0, lastPrice: 0, unidade: r.unidade || 'UN' };
    freq[k].count++;
    freq[k].lastPrice = r.unit > 0 ? r.unit : freq[k].lastPrice;
    freq[k].unidade = r.unidade || freq[k].unidade;
  });

  // Classifica cada produto em uma categoria (via classifyId)
  const catItems = {};
  LISTA_CATS.forEach(c => catItems[c.id] = []);

  Object.values(freq)
    .filter(p => p.count >= 1)
    .sort((a, b) => b.count - a.count)
    .forEach(prod => {
      const id = classifyId(prod.label);
      (catItems[id] || catItems['mercearia']).push(prod);
    });

  // Salva no estado como itens gerados do histórico
  LISTA_STATE.histItems = catItems;
}

function getCatItems(catId) {
  const hist = (LISTA_STATE.histItems || {})[catId] || [];
  const cust = (LISTA_STATE.custom[catId] || []);
  return [...hist, ...cust];
}

function normL(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function renderLista(body) {
  // Garante lista gerada
  if (!LISTA_STATE.histItems) buildListaFromData();

  body.style.paddingBottom = '80px';
  body.innerHTML = `
    <div class="lista-wrap">
      ${DATA.length ? '' : `<button class="lista-generate-btn" onclick="buildListaFromData();renderLista(document.getElementById('dashBody'))">⟳ Carregar itens do histórico</button>`}

      <div class="lista-header-row">
        <input class="lista-search" id="lsearch" placeholder="🔍 buscar item..." value="${LISTA_STATE.search}" oninput="LISTA_STATE.search=this.value;renderListaItems()">
        <select class="lista-cat-sel" id="lcatsel" onchange="LISTA_STATE.catFilter=this.value;renderListaItems()">
          <option value="todas">📋 Todas</option>
          ${LISTA_CATS.map(c=>`<option value="${c.id}" ${LISTA_STATE.catFilter===c.id?'selected':''}>${c.emoji} ${c.name}</option>`).join('')}
        </select>
      </div>

      <div class="lista-chips">
        <button class="lchip ${LISTA_STATE.itemFilter==='todos'?'on':''}" onclick="LISTA_STATE.itemFilter='todos';renderListaItems()">Todos</button>
        <button class="lchip ${LISTA_STATE.itemFilter==='pendentes'?'on':''}" onclick="LISTA_STATE.itemFilter='pendentes';renderListaItems()">Pendentes</button>
        <button class="lchip ${LISTA_STATE.itemFilter==='marcados'?'on':''}" onclick="LISTA_STATE.itemFilter='marcados';renderListaItems()">Marcados ✓</button>
        <button class="lchip sug-chip" onclick="toggleSugestao()">✦ Sugestão</button>
        <button class="lchip" onclick="lclearChecked()" style="margin-left:auto;color:var(--hot)">Limpar ✓</button>
        <button class="lchip" onclick="lresetAll()">Desmarcar tudo</button>
      </div>

      <div id="sugPanel" style="display:none"></div>
      <div id="listaContent"></div>
    </div>

    <div class="lista-bottom">

function renderListaItems() {
  const container = document.getElementById('listaContent');
  if (!container) return;
  container.innerHTML = '';

  const sq = normL(LISTA_STATE.search);
  const cats = LISTA_STATE.catFilter === 'todas' ? LISTA_CATS : LISTA_CATS.filter(c => c.id === LISTA_STATE.catFilter);

  let total = 0, done = 0;

  cats.forEach(cat => {
    const allItems = getCatItems(cat.id);
    const filtered = allItems.filter(it => {
      const id = `${cat.id}__${it.label}`;
      if (sq && !normL(it.label).includes(sq)) return false;
      if (LISTA_STATE.itemFilter === 'pendentes') return !LISTA_STATE.checked[id];
      if (LISTA_STATE.itemFilter === 'marcados')  return !!LISTA_STATE.checked[id];
      return true;
    });

    if (!filtered.length) return;

    const catDone = filtered.filter(it => LISTA_STATE.checked[`${cat.id}__${it.label}`]).length;
    total += filtered.length; done += catDone;
    const isCollapsed = LISTA_STATE.collapsed[cat.id];

    const card = document.createElement('div');
    card.className = `lcat-card${isCollapsed ? ' collapsed' : ''}`;
    card.id = `lcat-${cat.id}`;

    card.innerHTML = `
      <div class="lcat-header" onclick="ltoggleCat('${cat.id}')">
        <div class="lcat-left">
          <span class="lcat-emoji">${cat.emoji}</span>
          <span class="lcat-name">${cat.name}</span>
          <span class="lcat-badge${catDone === filtered.length && filtered.length ? ' done' : ''}">${catDone}/${filtered.length}</span>
        </div>
        <span class="lcat-chevron">▼</span>
      </div>
      <div class="litems-list">
        ${filtered.map(it => {
          const id = `${cat.id}__${it.label}`;
          const isChk = !!LISTA_STATE.checked[id];
          const priceStr = it.lastPrice > 0 ? fmtR(it.lastPrice) + '/' + (it.unidade || 'UN') : '';
          const countStr = it.count > 1 ? `${it.count}× comprado` : '';
          const sub = [priceStr, countStr].filter(Boolean).join(' · ');
          return `<div class="litem-row${isChk ? ' checked' : ''}" onclick="ltoggleItem('${cat.id}','${it.label.replace(/'/g,"\'")}')">
            <div class="lcb"><span class="lcb-tick">✓</span></div>
            <div class="item-label" style="font-family:'Syne',sans-serif;font-size:13px">${it.label}${sub ? `<span class="litem-sub">${sub}</span>` : ''}</div>
            ${isChk ? '' : `<span class="litem-price">${priceStr}</span>`}
          </div>`;
        }).join('')}
        <div class="ladd-row">
          <input id="lai-${cat.id}" placeholder="+ adicionar item..." onkeydown="if(event.key==='Enter')laddItem('${cat.id}')">
          <button class="ladd-btn" onclick="laddItem('${cat.id}')">+</button>
        </div>
      </div>`;

    container.appendChild(card);
  });

  if (!container.children.length) {
    container.innerHTML = `<div class="empty">Nenhum item encontrado</div>`;
  }

  const pct = total ? Math.round(done / total * 100) : 0;
  const pill = document.getElementById('lprogPill');
  if (pill) pill.innerHTML = `<b>${total - done}</b> pendentes · <b>${pct}%</b> concluído`;
}

function ltoggleItem(catId, label) {
  const id = `${catId}__${label}`;
  if (LISTA_STATE.checked[id]) delete LISTA_STATE.checked[id];
  else LISTA_STATE.checked[id] = true;
  renderListaItems();
}

function ltoggleCat(catId) {
  LISTA_STATE.collapsed[catId] = !LISTA_STATE.collapsed[catId];
  const card = document.getElementById(`lcat-${catId}`);
  if (card) card.classList.toggle('collapsed');
}

function laddItem(catId) {
  const inp = document.getElementById(`lai-${catId}`);
  const val = inp ? inp.value.trim() : '';
  if (!val) return;
  if (!LISTA_STATE.custom[catId]) LISTA_STATE.custom[catId] = [];
  LISTA_STATE.custom[catId].push({ id: `c_${catId}_${Date.now()}`, label: val, count: 1, lastPrice: 0, unidade: 'UN' });
  inp.value = '';
  renderListaItems();
}

// Ciclos padrão por categoria (fallback quando há poucos dados)
const CICLO_CAT = {
  hortifruti:5, padaria:4, acougue:7, frios:8,
  mercearia:21, bebidas:7, limpeza:30, higiene:30, outros:21

function parseDataBR(str) {
  if (!str) return null;
  const p = str.split('/');
  if (p.length === 3) return new Date(+p[2], +p[1]-1, +p[0]);
  return null;
}

// Normaliza o nome do produto removendo marcas, tamanhos, tipos, variações
// Ex: "TOMATE ANDREA kg" → "tomate"
// Ex: "MAMAO HAVAI KG" → "mamao"
// Ex: "SALS.REZ.H.DOG.kg" → "salsicha"
function normalizarNome(nome) {
  let s = nome.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .replace(/[._]/g, ' ')       // pontos e underscores viram espaço
    .replace(/\bkg\b|\bun\b|\bpt\b|\bgf\b|\blt\b|\bbj\b|\bfr\b|\brl\b|\bvd\b|\bsh\b|\btp\b|\bpv\b|\bml\b|\bg\b/g, '')
    .replace(/\d+[lgkm]?[lg]?\b/g, '')  // remove quantidades: 500g, 1l, 1kg
    .replace(/\b(kg|ml|gr|lt|lts|un|pct|cx|sc|vd|lata|garrafa|embal|fardo|display|cx|caixa|pote|pc|bj|pt|gf|rl|sh|tp)\b/g, '')
    .replace(/\b(andrea|havai|iana|tomy|taiti|tha|imp|prata|roxa|amar|verd|verm|branca|extra|miuda|mista|granel|resf|cong|def|coz|fat|fres|fresc|hidr|som|prop|ass)\b/g, '')
    .replace(/\b(seara|sadia|perdigao|friall|rezende|aurora|itambe|nestl|camil|galante|pacha|baudu|liza|omo|comfort|comf|cif|pinho|bom|real|fleisch|friboi|jbs|minerva|marfrig)\b/g, '')
    .replace(/\b(nort|sul|norte|sul|leste|oeste|minas|mg|sp|rj|br|import|nac|nacional|importado)\b/g, '')
    .replace(/c\/\d+|\d+x\d+/g, '')  // remove "c/30", "6x"
    .replace(/\b\w{1,2}\b/g, ' ')    // remove palavras muito curtas (siglas soltas)
    .replace(/\s+/g, ' ').trim();

  // Mapeamentos manuais de abreviações comuns
  const mapa = {
    'tomate': ['tomate','tomat'],
    'mamao': ['mamao','papaya'],
    'banana': ['banana','bananamaca'],
    'laranja': ['laranja','lar pera','lar.pera'],
    'limao': ['limao'],
    'manga': ['manga'],
    'melao': ['melao'],
    'melancia': ['melancia'],
    'cenoura': ['cenoura','cenouraverm'],
    'cebola': ['cebola','cebolaamar','cebolaroxa'],
    'alho': ['alho'],
    'batata': ['batata'],
    'pimentao': ['pimentao','pim verm','pim verde'],
    'salsicha': ['salsicha','sals','hot dog'],
    'frango': ['frango','fgo','frangos','asa fgo','coxa','sobrecoxa','pe fr','pe fgo','file pe','file fgo','filez'],
    'carne moida': ['carne moida','acem','pa bov','patinho','coxao','alcatra','musculo','musculo'],
    'ovos': ['ovos','ovo'],
    'leite': ['leite','lei'],
    'iogurte': ['iogurte','iog','yogurt'],
    'manteiga': ['manteiga','mant'],
    'queijo': ['queijo','qjo','queijao','mussarela','muss','mucs'],
    'requeijao': ['requeijao','req'],
    'presunto': ['presunto','pres'],
    'arroz': ['arroz','arr'],
    'feijao': ['feijao','feij'],
    'cafe': ['cafe'],
    'agua': ['agua','ag min','ag.min'],
    'cerveja': ['cerveja','cerv','cer stel','cer.stel'],
    'refrigerante': ['refrigerante','refri','refr','coca','pepsi'],
    'azeite': ['azeite','azeit'],
    'oleo': ['oleo'],
    'acucar': ['acucar'],
    'detergente': ['detergente'],
    'sabao': ['sabao','sab'],
    'amaciante': ['amaciante','amac'],
    'papel higienico': ['papel hig','pap hig','papel higienico'],
    'papel toalha': ['papel toalha','toalha pap','toal pap'],
    'racao': ['racao','rac','keldog','pedigree'],
  };

  // Match no mapa: o alias precisa aparecer como PALAVRA(S) INTEIRA(S),
  // não como simples substring. Isso evita que "cer" (de CER.CAP.SEN.PIL)
  // case com "cerveja" e funda produtos diferentes no mesmo grupo.
  const tokens = s.split(' ').filter(Boolean);
  const aliasBate = (a) => {
    const at = a.split(' ').filter(Boolean);
    if (!at.length) return false;
    if (at.length === 1) return tokens.includes(at[0]);          // palavra única
    for (let i = 0; i + at.length <= tokens.length; i++) {        // frase: tokens consecutivos
      if (at.every((t, j) => tokens[i + j] === t)) return true;
    }
    return false;
  };
  for (const [canonical, aliases] of Object.entries(mapa)) {
    if (aliases.some(aliasBate)) return canonical;
  }

  // Sem match no mapa: usa a primeira palavra significativa (>3 letras).
  // Se NÃO houver nenhuma palavra significativa (só siglas curtas, ex.:
  // "cer cap sen pil"), usa o nome limpo INTEIRO como chave — assim produtos
  // distintos não são fundidos só por compartilharem a primeira sigla.
  const palavras = tokens.filter(p => p.length > 3);
  return palavras[0] || s || nome.toLowerCase().trim();
}

// Constrói mapa de grupos genéricos a partir do DATA
// Retorna: { "tomate": { datas: [Date,...], lastPrice, unidade, catId, displayName } }
function buildGruposGenericos() {
  const grupos = {};

  DATA.forEach(r => {
    const generico = normalizarNome(r.desc);
    if (!generico || generico.length < 3) return;

    const data = parseDataBR(r.data);
    if (!data || isNaN(data)) return;

    // Descobre categoria (via classifyId)
    const catId = classifyId(r.desc);

    if (!grupos[generico]) {
      grupos[generico] = {
        datas: [],
        lastPrice: 0,
        unidade: r.unidade || 'UN',
        catId,
        displayName: r.desc.trim(), // nome mais recente como display
      };
    }
    grupos[generico].datas.push(data);
    if (r.unit > 0) grupos[generico].lastPrice = r.unit;
  });

  // Remove duplicatas de data (mesma data = mesma compra)
  Object.values(grupos).forEach(g => {
    const uniq = {};
    g.datas.forEach(d => { uniq[d.toDateString()] = d; });
    g.datas = Object.values(uniq).sort((a, b) => a - b);
  });

  return grupos;
}

// ── Parâmetros da análise de recorrência ──
const JANELA_DIAS       = 120; // janela de análise: ~4 meses
const MIN_COMPRAS_JANELA = 3;  // mín. de compras DENTRO da janela p/ ser recorrente

function calcularAnalise(generico, grupo) {
  const { datas, lastPrice, unidade, catId, displayName } = grupo;

  // Precisa de pelo menos 2 datas p/ existir 1 intervalo
  if (datas.length < 2) return null;

  const hoje = new Date();
  const ultimaCompra = datas[datas.length - 1];
  const diasDesdeUltima = Math.floor((hoje - ultimaCompra) / 86400000);
  const totalCompras = datas.length;

  // ── Janela de 4 meses a partir de hoje ──
  const limiteJanela = new Date(hoje.getTime() - JANELA_DIAS * 86400000);
  const datasJanela = datas.filter(d => d >= limiteJanela);
  const comprasPeriodo = datasJanela.length; // quantas vezes comprou em 4 meses

  // FILTRO DE RECORRÊNCIA:
  // item comprado poucas vezes na janela (ex.: 1x a cada 3 meses) NÃO é
  // recorrente e fica de fora da sugestão.
  if (comprasPeriodo < MIN_COMPRAS_JANELA) return null;

  // Intervalos (em dias) entre todas as compras consecutivas
  const intervalos = [];
  for (let i = 1; i < datas.length; i++) {
    const diff = (datas[i] - datas[i-1]) / 86400000;
    if (diff > 0 && diff < 365) intervalos.push(diff);
  }
  if (!intervalos.length) return null;

  // ── MÉDIA PONDERADA POR RECÊNCIA ──
  // Intervalos mais recentes pesam mais (peso linear crescente):
  // o intervalo mais novo tem peso = n; o mais antigo, peso = 1.
  // Assim a previsão acompanha o ritmo de compra ATUAL, não o histórico antigo.
  let somaPond = 0, somaPesos = 0;
  intervalos.forEach((iv, idx) => {
    const peso = idx + 1;            // idx 0 = mais antigo
    somaPond  += iv * peso;
    somaPesos += peso;
  });
  const intervaloMedio = Math.round(somaPond / somaPesos);
  if (intervaloMedio < 1) return null;

  // Frequência média na janela (compras a cada ~30 dias)
  const freqMensal = +(comprasPeriodo / (JANELA_DIAS / 30)).toFixed(1);

  const pctVencido = diasDesdeUltima / intervaloMedio;

  let urgencia, badge;
  if (pctVencido >= 1.2)      { urgencia = 'urgent'; badge = 'URGENTE'; }
  else if (pctVencido >= 0.8) { urgencia = 'warn';   badge = 'ATENÇÃO'; }
  else                         { urgencia = 'ok';     badge = 'OK'; }

  // Score de prioridade: vencimento × peso da frequência.
  // Itens comprados mais vezes na janela sobem na lista, evitando que itens
  // raros (mas "vencidos") apareçam acima dos recorrentes de verdade.
  const score = pctVencido * (1 + Math.log10(1 + comprasPeriodo));

  return {
    generico,
    displayName,
    catId,
    lastPrice,
    unidade,
    urgencia,
    badge,
    diasDesdeUltima,
    intervaloMedio,
    totalCompras,
    comprasPeriodo,
    freqMensal,
    score,
    ultimaCompra: ultimaCompra.toLocaleDateString('pt-BR'),
    pctVencido,
  };
}

function renderSugestao() {
  const panel = document.getElementById('sugPanel');
  if (!panel) return;
  panel.style.display = 'block';
  panel.innerHTML = `<div class="sug-panel">
    <div class="sug-header">
      <div>
        <div class="sug-title">✦ SUGESTÃO INTELIGENTE</div>
        <div class="sug-subtitle">Janela de 4 meses · média ponderada por recência · mín. 3 compras no período</div>
      </div>
      <button class="sug-close" onclick="toggleSugestao()">✕</button>
    </div>
    <div class="sug-body">
      <div class="sug-loading">⟳ Analisando histórico…</div>
    </div>
  </div>`;

  setTimeout(() => {
    const grupos = buildGruposGenericos();
    const resultados = Object.entries(grupos)
      .map(([g, data]) => calcularAnalise(g, data))
      .filter(Boolean)
      .sort((a, b) => {
        const ordem = { urgent:0, warn:1, ok:2 };
        return ordem[a.urgencia] - ordem[b.urgencia] || b.score - a.score;
      });

    if (!resultados.length) {
      panel.querySelector('.sug-body').innerHTML = '<div class="sug-loading">Sem dados suficientes no histórico.</div>';
      return;
    }

    const urgentes  = resultados.filter(r => r.urgencia === 'urgent');
    const atencao   = resultados.filter(r => r.urgencia === 'warn');
    const emEstoque = resultados.filter(r => r.urgencia === 'ok').slice(0, 8);
    const urgCount  = urgentes.length + atencao.length;

    const cat = (catId) => LISTA_CATS.find(c => c.id === catId) || {emoji:'📦', name:'Outros'};

    const cicloLabel = (r) =>
      `ciclo ~${r.intervaloMedio}d · ${r.comprasPeriodo}× em 4 meses`;

    const buildItems = (list) => list.map(r => {
      // Usa generico como ID para marcar na lista
      const catInfo = cat(r.catId);
      const priceStr = r.lastPrice > 0 ? ` · ${fmtR(r.lastPrice)}` : '';
      const isChk = !!LISTA_STATE.sugChecked?.[r.generico];
      return `<div class="sug-item ${r.urgencia}${isChk?' checked-sug':''}"
        onclick="ltogglesug_gen('${r.generico.replace(/'/g,"\'")}','${r.displayName.replace(/'/g,"\'")}','${r.catId}',this)">
        <div class="sug-item-info">
          <div class="sug-item-name">${catInfo.emoji} ${r.displayName}</div>
          <div class="sug-item-meta">Última: ${r.ultimaCompra} · ${r.diasDesdeUltima}d atrás · ${cicloLabel(r)}${priceStr}</div>
        </div>
        <span class="sug-badge ${r.urgencia}">${r.badge}</span>
      </div>`;
    }).join('');

    panel.querySelector('.sug-body').innerHTML = `
      ${urgentes.length ? `<div class="sug-section">
        <div class="sug-section-title" style="color:var(--hot)">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--hot);display:inline-block"></span>
          Provavelmente em falta (${urgentes.length})
        </div>
        <div class="sug-items">${buildItems(urgentes)}</div>
      </div>` : ''}
      ${atencao.length ? `<div class="sug-section">
        <div class="sug-section-title" style="color:var(--warm)">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--warm);display:inline-block"></span>
          Repor em breve (${atencao.length})
        </div>
        <div class="sug-items">${buildItems(atencao)}</div>
      </div>` : ''}
      ${emEstoque.length ? `<div class="sug-section">
        <div class="sug-section-title" style="color:var(--mint)">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--mint);display:inline-block"></span>
          Estoque ok (${emEstoque.length}/${resultados.filter(r=>r.urgencia==='ok').length})
        </div>
        <div class="sug-items">${buildItems(emEstoque)}</div>
      </div>` : ''}
      ${urgCount > 0 ? `<button class="sug-add-all" onclick="laddAllUrgent_gen()">↗ ADICIONAR URGENTES + ATENÇÃO (${urgCount})</button>` : ''}
    `;
  }, 50);
}

// Marca o item genérico na lista — usa o displayName como label na categoria correta
if (!LISTA_STATE.sugChecked) LISTA_STATE.sugChecked = {};

function ltogglesug_gen(generico, displayName, catId, el) {
  if (!LISTA_STATE.sugChecked) LISTA_STATE.sugChecked = {};
  const id = `${catId}__${displayName}`;

  if (LISTA_STATE.sugChecked[generico]) {
    delete LISTA_STATE.sugChecked[generico];
    delete LISTA_STATE.checked[id];
    el.classList.remove('checked-sug');
  } else {
    LISTA_STATE.sugChecked[generico] = true;
    LISTA_STATE.checked[id] = true;
    el.classList.add('checked-sug');
  }
  renderListaItems();
}

function laddAllUrgent_gen() {
  if (!LISTA_STATE.sugChecked) LISTA_STATE.sugChecked = {};
  const grupos = buildGruposGenericos();
  Object.entries(grupos).forEach(([g, data]) => {
    const r = calcularAnalise(g, data);
    if (!r || r.urgencia === 'ok') return;
    LISTA_STATE.sugChecked[r.generico] = true;
    LISTA_STATE.checked[`${r.catId}__${r.displayName}`] = true;
  });
  renderListaItems();
  renderSugestao();
}

// Mantém retrocompatibilidade
function ltogglesug(catId, label, el) { ltogglesug_gen(label, label, catId, el); }
function laddAllUrgent() { laddAllUrgent_gen(); }

function lclearChecked() {
  if (!confirm('Remover todos os itens marcados?')) return;
  LISTA_STATE.checked = {};
  renderListaItems();
}

function lresetAll() {
  if (!confirm('Desmarcar todos os itens?')) return;
  LISTA_STATE.checked = {};
  renderListaItems();
}

function lbuildText() {
  const today = new Date().toLocaleDateString('pt-BR');
  let lines = [`🛒 *Lista de Compras — ${today}*\n`];
  let any = false;
  LISTA_CATS.forEach(cat => {
    const all = getCatItems(cat.id);
    const sel = all.filter(it => LISTA_STATE.checked[`${cat.id}__${it.label}`]);
    if (!sel.length) return;
    any = true;
    lines.push(`\n${cat.emoji} *${cat.name}*`);
    sel.forEach(it => {
      const price = it.lastPrice > 0 ? ` _(últ: ${fmtR(it.lastPrice)})_` : '';
      lines.push(`☐ ${it.label}${price}`);
    });
  });
  if (!any) return null;
  lines.push(`\n_Gerado pelo SmartCart_ 🛒`);

// ═══ Helpers de data ═══
function excelDateToStr(val) {
  if (!val && val !== 0) return '';
  const s = String(val).trim();
  if (/\d{2}[\/\-]\d{2}[\/\-]\d{4}/.test(s) || /\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(s)) return s;
  const n = Number(val);
  if (!isNaN(n) && n > 40000 && n < 60000) {
    const d = new Date(Math.round((n-25569)*86400*1000));
    return pad(d.getUTCDate())+'/'+pad(d.getUTCMonth()+1)+'/'+d.getUTCFullYear();
  }
  if (val instanceof Date) return pad(val.getDate())+'/'+pad(val.getMonth()+1)+'/'+val.getFullYear();
  return s;
}
const pad = n => String(n).padStart(2,'0');

// ═══ Parse planilha local ═══
function parseRows(rows, emitente) {
  if (!rows.length) return [];
  const cols = Object.keys(rows[0]);
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[_\s\/\.]/g,'');
  const find = kws => cols.find(c => kws.some(k => norm(c).includes(k))) || cols[0];
  const Cf = {
    data:  find(['data','date','dia']),
    desc:  find(['descricao','descri','desc','produto','item','nome','mercadoria']),
    qty:   find(['quantkg','quant','qtd','qty','quantidade','qtde']),
    unit:  find(['valorunit','vlunit','unit','precounit','prunit']),
    total: find(['valor','total','vltotal','valortotal','subtotal']),
    unit_: find(['unidade','un']),
  };
  return rows.map(r => ({
    data:     excelDateToStr(r[Cf.data]),
    desc:     String(r[Cf.desc]||'').trim(),
    qty:      parseQty(r[Cf.qty]),
    unit:     parseBRL(r[Cf.unit]),
    total:    parseBRL(r[Cf.total]),
    unidade:  String(r[Cf.unit_]||'UN').trim(),
    emitente: emitente || 'Importado',
    cnpj:     '',
  })).filter(r => r.desc && r.total > 0);
}

function parseQty(v) {
  // Valores > 10.000 são seriais de data do Excel lidos erroneamente — descarta
  if (!v && v !== 0) return 1;
  const s = String(v).trim();
  // Remove formatação BRL se vier assim: "1.234,5" → 1234.5
  let n;
  if (s.includes(',')) {
    n = parseFloat(s.replace(/\./g,'').replace(',','.'));
  } else {
    n = parseFloat(s);
  }
  if (isNaN(n) || n <= 0 || n > 10000) return 1;
  return n;
}

function parseBRL(v) {
  if (!v && v !== 0) return 0;
  // Se já é número (SheetJS entrega numeric direto), usa direto
  if (typeof v === 'number') return v;
  const s = String(v).replace(/R\$\s*/,'').trim();
  // Formato BRL: "1.234,56" → remove pontos de milhar, troca vírgula por ponto
  if (s.includes(',')) {
    return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  }
  // Já está em formato numérico: "5.48"
  return parseFloat(s) || 0;
}

async function fetchText(url) {

      if (!res.ok) throw new Error('HTTP ' + res.status);

// ═══ Extração NFC-e ═══
function parseNFCeHTML(html, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Emitente
  const tables = doc.querySelectorAll('table');
  let emitente = '', cnpj = '', data = '';

  // Tenta pegar data de emissão
  const tds = [...doc.querySelectorAll('td')];
  tds.forEach(td => {
    const t = td.textContent.trim();
    // Procura padrão dd/mm/yyyy hh:mm:ss
    const m = t.match(/(\d{2}\/\d{2}\/\d{4})\s+\d{2}:\d{2}/);
    if (m && !data) data = m[1];
  });

  // Emitente — primeira célula grande geralmente tem o nome
  const ths = [...doc.querySelectorAll('th, td')];
  for (const el of ths) {
    const t = el.textContent.trim();
    if (t.includes('CNPJ:') && !emitente) {
      // Linha anterior ou texto ao redor
      const prev = el.previousElementSibling;
      if (prev) emitente = prev.textContent.trim();
    }
  }
  // Fallback: <b> ou <strong> antes do CNPJ
  const bolds = [...doc.querySelectorAll('b, strong, h4, h3')];
  for (const b of bolds) {
    const t = b.textContent.trim();
    if (t && t.length > 3 && !t.includes('//') && !emitente) {
      emitente = t;
      break;
    }
  }

  // CNPJ
  const cnpjMatch = doc.body.textContent.match(/CNPJ[:\s]+([0-9.\/\-]{14,20})/i);
  if (cnpjMatch) cnpj = cnpjMatch[1].replace(/[^\d]/g,'');

  // Itens — tabelas com 4 colunas (desc, qtd, un, valor)
  const rows = [];
  doc.querySelectorAll('table').forEach(tbl => {
    const trs = tbl.querySelectorAll('tr');
    trs.forEach(tr => {
      const cells = [...tr.querySelectorAll('td')];
      if (cells.length >= 4) {
        // Heurística: última cell é valor (R$), penúltima é unidade, antepenúltima qtd, primeira desc
        const lastText = cells[cells.length-1].textContent.trim();
        const valMatch = lastText.match(/R\$\s*([\d.,]+)/);
        if (!valMatch) return;
        const valor = parseFloat(valMatch[1].replace('.','').replace(',','.'));
        if (!valor || valor <= 0) return;

        const descCell = cells[0].textContent.trim();
        if (!descCell || descCell.length < 2) return;
        if (/CNPJ|Inscrição|Protocolo|Chave|Emitente|Consumidor|Data|Modelo|Série|Número|Destino|Base|ICMS|Protocolo|Qtde total/i.test(descCell)) return;

        // Qtd — procurar número decimal
        let qty = 1, unidade = 'UN';
        for (let i = 1; i < cells.length - 1; i++) {
          const ct = cells[i].textContent.trim();
          const qm = ct.match(/^([\d.,]+)$/);
          if (qm) { qty = parseFloat(qm[1].replace(',','.')); }
          if (/^(UN|KG|kg|BJ|PT|GF|LT|FR|RL|PO|VD|TB|SH|TP)$/i.test(ct)) unidade = ct.toUpperCase();
        }

        // Código entre parênteses: "DESC (Código: 123)" → limpa
        const descClean = descCell.replace(/\s*\(Código:[^)]+\)/i,'').trim();

        // Valor unitário calculado
        const unitCalc = qty > 0 ? valor / qty : valor;

        rows.push({
          data, desc: descClean, qty, unit: parseFloat(unitCalc.toFixed(2)),
          total: valor, unidade, emitente, cnpj
        });
      }
    });
  });

  return rows;
}

function extractSheetId(url) {

  return m ? m[1] : null;
}

// ═══ Lê planilha do Google Sheets via export ═══
async function fetchGoogleSheet(url) {
  const id = extractSheetId(url);
  if (!id) throw new Error('Link inválido — não encontrei o ID do Google Sheets');

  // Exporta como xlsx
  const exportUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=xlsx`;
  const buf = await fetchBuf(exportUrl);
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });

}

// ═══ Lê links da aba "Links" ═══
function extractLinks(wb) {
  // Procura aba com "link" no nome (case insensitive)
  const linkSheet = wb.SheetNames.find(n => /link/i.test(n)) || wb.SheetNames[0];
  const ws = wb.Sheets[linkSheet];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const links = [];
  rows.forEach(row => {
    row.forEach(cell => {
      const s = String(cell).trim();
      if (s.startsWith('http') && s.includes('sped') || s.includes('nfce') || s.includes('qrcode')) {
        links.push(s);
      } else if (s.startsWith('http')) {
        links.push(s);
      }
    });
  });
  return [...new Set(links)]; // deduplica
}

// ═══ Lê aba "Dados" ═══
function extractDados(wb) {
  const dadosSheet = wb.SheetNames.find(n => /dado/i.test(n));
  if (!dadosSheet) return [];
  const ws = wb.Sheets[dadosSheet];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
  return parseRows(rows, 'Histórico');
}

function getVisits() {

    if (!m[r.data]) m[r.data]={data:r.data,total:0,qty:0,itens:0,emitente:r.emitente};
    m[r.data].total+=r.total; m[r.data].qty+=r.qty; m[r.data].itens++;
  });
  const toTs = d => { const p=d.split('/'); return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).getTime():new Date(d).getTime(); };
  return Object.values(m).sort((a,b)=>toTs(a.data)-toTs(b.data));
}
function getItems() {
  // Totais/qty filtrados pelo mês ativo
  const mFiltered = {};
  getFilteredData().forEach(r => {
    if (!mFiltered[r.desc]) mFiltered[r.desc]={desc:r.desc,total:0,qty:0,count:0,prices:[]};
    mFiltered[r.desc].total+=r.total; mFiltered[r.desc].qty+=r.qty; mFiltered[r.desc].count++;
  });
  // Preços sempre do período completo (todos os meses) — chave: desc+unidade
  DATA.forEach(r => {
    if (!mFiltered[r.desc]) return; // só agrega preços de itens que aparecem no filtro
    if (r.unit>0) mFiltered[r.desc].prices.push({price:r.unit,date:r.data,unidade:r.unidade||'UN'});
  });
  return Object.values(mFiltered).sort((a,b)=>b.total-a.total);
}

function getAllItems() {
  const m = {};

    const key = r.desc + '||' + (r.unidade||'UN');
    if (!m[key]) m[key]={desc:r.desc,unidade:r.unidade||'UN',total:0,qty:0,count:0,prices:[]};
    m[key].total+=r.total; m[key].qty+=r.qty; m[key].count++;
    if (r.unit>0) m[key].prices.push({price:r.unit,date:r.data});
  });
  return Object.values(m).sort((a,b)=>b.total-a.total);

function getEmitentes() {
  const m = {};
  getFilteredData().forEach(r => {
    const k = r.emitente||'Desconhecido';
    if (!m[k]) m[k]={nome:k,cnpj:r.cnpj||'',total:0,count:0,visitas:new Set()};
    m[k].total+=r.total; m[k].count++;
    if (r.data) m[k].visitas.add(r.data);
  });
  return Object.values(m).sort((a,b)=>b.total-a.total);
}
function getCorrs() {
  const byDate = {};
  getFilteredData().forEach(r => {
    if (!byDate[r.data]) byDate[r.data]=new Set();
    byDate[r.data].add(r.desc);
  });
  const pairs = {};
  Object.values(byDate).forEach(set => {
    const arr=[...set];
    for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++) {
      const k=[arr[i],arr[j]].sort().join('\x00');
      pairs[k]=(pairs[k]||0)+1;
    }
  });
  const total=Object.keys(byDate).length;
  return Object.entries(pairs)
    .map(([k,v])=>{const [a,b]=k.split('\x00');return{a,b,count:v,pct:Math.round(v/total*100)};})
    .sort((a,b)=>b.count-a.count).slice(0,16);
}

    DRIVE_URL=''; DRIVE_LOADED=false;
    const sb=document.getElementById('syncBtn'); if(sb) sb.style.display='none';
    const fp=document.getElementById('fetchProgress'); if(fp) fp.style.display='none';
    const fl=document.getElementById('fetchLog'); if(fl) fl.innerHTML='';
    const fb=document.getElementById('fetchBar'); if(fb) fb.style.width='0%';
    document.getElementById('driveUrl').value='';
  }
  document.getElementById('dashboard').style.display='none';
  document.getElementById('uploadScreen').style.display='flex';
}

// ═══ Tabs ═══
function renderTab() {
  killCharts();
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab));
  const body=document.getElementById('dashBody');
  body.innerHTML='';
  buildFilterBar();
  const fd=getFilteredData();
  const visits=getVisits(), items=getItems();
  const totalG=fd.reduce((s,r)=>s+r.total,0);
  const totalQ=fd.reduce((s,r)=>s+r.qty,0);
  const ticketV=visits.length?totalG/visits.length:0;
  const ticketI=totalQ?totalG/totalQ:0;
  if(activeTab==='visao')          renderVisao(body,visits,items,totalG,totalQ,ticketV,ticketI);
  else if(activeTab==='emitentes') renderEmitentes(body);
  else if(activeTab==='pareto')    renderPareto(body,items,totalG);
  else if(activeTab==='correlacao')renderCorrelacao(body);
  else if(activeTab==='preco')     renderPreco(body,getAllItems());
  else if(activeTab==='volatilidade') renderVolatilidade(body,getAllItems());
  else if(activeTab==='detalhes')  renderDetalhes(body);
  else if(activeTab==='lista')      renderLista(body);
  body.classList.add('fade-up');
  setTimeout(()=>body.classList.remove('fade-up'),400);
}

// ═══ TAB: Alerta de Preço ═══
function renderPreco(body,items) {
  // Sempre usa período completo — items já vem de getAllItems()
  const withP = items.filter(it=>it.prices.length>0).sort((a,b)=>{
    // Ordena: vermelho (acima do mín) primeiro
    const aOk = a.prices[a.prices.length-1].price <= Math.min(...a.prices.map(x=>x.price))*1.05;
    const bOk = b.prices[b.prices.length-1].price <= Math.min(...b.prices.map(x=>x.price))*1.05;
    return aOk - bOk;
  });
  const acima = withP.filter(it=>{const p=it.prices;return p[p.length-1].price>Math.min(...p.map(x=>x.price))*1.05}).length;
  const ok = withP.length - acima;
  body.innerHTML=`
    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi"><div class="kpi-label">itens monitorados</div><div class="kpi-value">${withP.length}</div><div class="kpi-sub">período completo · por produto+unidade</div></div>
      <div class="kpi"><div class="kpi-label">acima do mínimo</div><div class="kpi-value" style="color:var(--red)">${acima}</div><div class="kpi-sub">pagando mais que o menor histórico</div></div>
      <div class="kpi"><div class="kpi-label">no menor preço</div><div class="kpi-value" style="color:var(--green)">${ok}</div><div class="kpi-sub">dentro de 5% do mínimo</div></div>
    </div>
    <div class="panel">
      <div class="panel-title" style="margin-bottom:4px">Alerta de preço alvo</div>
      <div class="panel-desc">// comparação por produto + unidade · histórico completo · vermelho = acima do mínimo já pago</div>
      <div class="alert-list" id="alertList"></div>
    </div>`;
  const list=document.getElementById('alertList');
  withP.slice(0,60).forEach(it=>{
    const prices=it.prices.map(p=>p.price);
    const minP=Math.min(...prices),maxP=Math.max(...prices);
    const lastP=it.prices[it.prices.length-1].price;
    const isOk=lastP<=minP*1.05;
    const diffPct=minP>0?(lastP-minP)/minP*100:0;
    const unBadge=it.unidade!=='UN'?`<span class="pill badge-blue" style="margin-left:6px">${it.unidade}</span>`:'';
    list.insertAdjacentHTML('beforeend',`<div class="alert-row">
      <div class="alert-ico" style="background:${isOk?'rgba(106,245,168,.12)':'rgba(245,106,106,.12)'}">
        ${isOk?`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${C.green}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${C.red}" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="13"/><circle cx="12" cy="17" r="1" fill="${C.red}"/></svg>`}
      </div>
      <div class="alert-info">
        <div class="alert-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span title="${it.desc}">${trunc(it.desc,30)}</span>${unBadge}
        </div>
        <div class="alert-prices">
          <span style="color:var(--green)">mín: ${fmtR(minP)}</span>
          <span style="color:var(--red)">máx: ${fmtR(maxP)}</span>
          <span style="color:var(--muted)">${it.prices.length}× comprado</span>
        </div>
      </div>
      <div class="alert-last">
        <div class="price" style="color:${isOk?C.green:C.red}">${fmtR(lastP)}</div>
        <div class="label">${isOk?'preço ok':'+'+fmtN(diffPct)+'% do mín'}</div>
      </div>
    </div>`);
  });
}

// ═══ TAB: Volatilidade ═══
function renderVolatilidade(body,items) {
  const wP=items.filter(it=>it.prices.length>=2);
  if(!wP.length){body.innerHTML=`<div class="panel"><div class="empty">são necessários ao menos 2 registros de preço por item</div></div>`;return;}
  body.innerHTML=`
    <div class="panel">
      <div class="panel-header"><div><div class="panel-title">Volatilidade de preço por item</div><div class="panel-desc">// variação do preço unitário ao longo das compras</div></div></div>
      <select class="vol-select" id="volSel">${wP.map((it,i)=>`<option value="${i}">${it.desc}</option>`).join('')}</select>
      <div style="margin-top:20px">
        <div class="chart-box" style="height:280px"><canvas id="cVol"></canvas></div>
        <div class="vol-stats" id="volStats"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title" style="margin-bottom:4px">Ranking de volatilidade</div>
      <div class="panel-desc">// produtos com maior variação percentual de preço</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>#</th><th>produto</th><th class="num">mínimo</th><th class="num">máximo</th><th class="num">variação</th><th class="num">registros</th></tr></thead>
        <tbody>${wP.slice(0,15).map((it,i)=>{
          const ps=it.prices.map(p=>p.price);
          const mn=Math.min(...ps),mx=Math.max(...ps),v=(mx-mn)/mn*100;
          return`<tr><td><span class="rank">${i+1}</span></td><td>${trunc(it.desc,36)}</td><td class="num" style="color:var(--green)">${fmtR(mn)}</td><td class="num" style="color:var(--red)">${fmtR(mx)}</td><td class="num"><span class="pill ${v>20?'badge-red':v>10?'badge-amber':'badge-green'}">${fmtPct(v)}</span></td><td class="num" style="color:var(--muted)">${it.prices.length}×</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;

  function drawVol(idx) {
    if(chartReg.vol){chartReg.vol.destroy();delete chartReg.vol;}
    const it=wP[idx];
    const sorted=[...it.prices].sort((a,b)=>a.date.localeCompare(b.date));
    const vals=sorted.map(p=>+p.price.toFixed(2));
    const labels=sorted.map(p=>p.date);
    const minP=Math.min(...vals),maxP=Math.max(...vals),avg=vals.reduce((s,v)=>s+v,0)/vals.length;
    const vol=(maxP-minP)/minP*100;
    chartReg.vol=new Chart(document.getElementById('cVol'),{type:'line',data:{labels,datasets:[
      {label:'Preço',data:vals,borderColor:C.accent,backgroundColor:'rgba(0,201,255,.06)',tension:.4,pointRadius:5,pointBackgroundColor:C.accent,fill:true,borderWidth:2},
      {label:'Mínimo',data:Array(vals.length).fill(+minP.toFixed(2)),borderColor:'rgba(106,245,168,.5)',borderDash:[5,4],pointRadius:0,borderWidth:1.5},
      {label:'Média',data:Array(vals.length).fill(+avg.toFixed(2)),borderColor:'rgba(245,196,106,.5)',borderDash:[5,4],pointRadius:0,borderWidth:1.5},
    ]},options:{...chartOpts({yPrefix:'R$ ',legend:false}),plugins:{...chartOpts({yPrefix:'R$ ',legend:false}).plugins,datalabels:{color:C.accent,font:{size:11,family:"'DM Mono',monospace",weight:'500'},formatter:v=>'R$ '+v.toFixed(2),anchor:'end',align:'top',offset:4,display:ctx=>ctx.datasetIndex===0}}}});
    document.getElementById('volStats').innerHTML=`
      <span class="pill badge-green">mínimo: ${fmtR(minP)}</span>
      <span class="pill badge-red">máximo: ${fmtR(maxP)}</span>
      <span class="pill badge-amber">média: ${fmtR(avg)}</span>
      <span class="pill badge-blue">variação: ${fmtPct(vol)}</span>`;
  }
  drawVol(0);
  document.getElementById('volSel').addEventListener('change',e=>drawVol(+e.target.value));
}

// ═══ TAB: Detalhes ═══
function renderDetalhes(body) {
  const fd = getFilteredData();
  const toTs = d=>{const p=d.split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).getTime():new Date(d).getTime();};
  const sorted = [...fd].sort((a,b)=>toTs(b.data)-toTs(a.data));
  body.innerHTML=`
    <div class="panel">
      <div class="panel-title" style="margin-bottom:16px">Todos os registros</div>
      <input class="search-input" id="searchInput" placeholder="Buscar produto…">
      <div class="tbl-wrap" id="detailTableWrap">
        <table>
          <thead><tr><th>data</th><th>produto</th><th>emitente</th><th class="num">qtd</th><th>unid</th><th class="num">unit.</th><th class="num">total</th></tr></thead>
          <tbody id="detailTbody"></tbody>
        </table>
      </div>
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--hint);margin-top:12px" id="detailCount">${sorted.length} registros</div>
    </div>`;

  function renderRows(rows) {
    document.getElementById('detailTbody').innerHTML = rows.slice(0,200).map(r=>`<tr>
      <td style="font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap">${r.data}</td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.desc}</td>
      <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12px">${trunc(r.emitente||'—',22)}</td>
      <td class="num">${r.qty}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${r.unidade||'UN'}</td>
      <td class="num" style="color:var(--muted)">${r.unit>0?fmtR(r.unit):'—'}</td>
      <td class="num" style="font-weight:600">${fmtR(r.total)}</td>
    </tr>`).join('');
    document.getElementById('detailCount').textContent = `${rows.length} registros${rows.length>200?' (exibindo 200)':''}`;
  }
  renderRows(sorted);
  document.getElementById('searchInput').addEventListener('input', e=>{
    const q = e.target.value.trim().toLowerCase();
    const filtered = q ? sorted.filter(r=>r.desc.toLowerCase().includes(q)||r.emitente?.toLowerCase().includes(q)) : sorted;
    renderRows(filtered);
  });
}

// ═══ Chart defaults ═══
function chartOpts({yPrefix='',legend=false}={}) {
  return {
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:legend},datalabels:{display:false}},
    scales:{
      x:{ticks:{color:C.muted,font:{size:11}},grid:{color:'#2e2e34'}},
      y:{ticks:{color:C.muted,font:{size:11},callback:v=>yPrefix+v.toFixed(0)},grid:{color:'#2e2e34'}}
    }
  };
}

// ═══ Eventos ═══
// Init tela inicial
document.getElementById('driveUrl').value = DRIVE_URL;
document.getElementById('driveBtn').addEventListener('click',processDrive);
document.getElementById('resetBtn').addEventListener('click',()=>showUpload());
document.getElementById('syncBtn').addEventListener('click',syncDrive);
document.getElementById('dashNav').addEventListener('click',e=>{
  const t=e.target.closest('.nav-tab');
  if(t){activeTab=t.dataset.tab;renderTab();}
});
</script>
